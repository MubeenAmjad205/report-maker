name: Daily Report Maker

on:
  schedule:
    # 14:45 UTC is 19:45 (7:45 PM) GMT+5.
    # 1-6 means Monday through Saturday (skips Sunday).
    - cron: "45 14 * * 1-6"
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Dependencies
        run: npm install

      - name: Run Report Maker
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_USERNAME: ${{ secrets.GITHUB_USERNAME || 'MubeenAmjad205' }}
          AI_PROVIDER: ${{ secrets.AI_PROVIDER }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MSTEAMS_WEBHOOK_URL: ${{ secrets.MSTEAMS_WEBHOOK_URL }}
        run: npm start
